# =============================================================================
# .gitlab-ci.yml — django-clade project
#
# Stages:
#   quality  — lint, type, security (every push)
#   test     — pytest full matrix + codecov upload (tag push only)
#
# Refs: DD-006 (test strategy), DD-009 (toolchain)
# GitLab: #6, #9
# =============================================================================

default:
  image: python:3.12

variables:
  UV_VERSION: "latest"
  PIP_NO_CACHE_DIR: "1"

# -----------------------------------------------------------------------------
# Pipeline rules
# -----------------------------------------------------------------------------
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH          # every push on any branch
    - if: $CI_COMMIT_TAG             # every tag push

# -----------------------------------------------------------------------------
# Stages
# -----------------------------------------------------------------------------
stages:
  - quality    # lint, type, security — fast, runs on every push
  - test       # pytest full matrix   — runs on tag only (DD-006)

# -----------------------------------------------------------------------------
# Shared setup — install uv and the project dev dependencies
# Used by quality jobs via YAML anchor <<: *setup
# -----------------------------------------------------------------------------
.setup: &setup
  before_script:
    - pip install uv --quiet
    - uv venv --quiet
    - source .venv/bin/activate
    - uv pip install -e ".[dev]" --quiet

# -----------------------------------------------------------------------------
# Quality stage — every push
# -----------------------------------------------------------------------------
lint:
  stage: quality
  <<: *setup
  script:
    - ruff check .
    - ruff format --check .
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

type:
  stage: quality
  <<: *setup
  script:
    - pyright
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

security:
  stage: quality
  <<: *setup
  script:
    - bandit -c pyproject.toml -r src/clade
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

# -----------------------------------------------------------------------------
# Test stage — tag push only (DD-006)
# Full matrix: Python 3.10–3.13 × Django 5.2 LTS
#
# Each job:
#   1. Installs uv and the pinned Django version
#   2. Runs pytest with coverage (exit code 5 = no tests collected, allowed)
#   3. Uploads the coverage report to codecov.io via codecov-cli
#
# Required CI variable (project scope, masked):
#   CODECOV_TOKEN — repository token from codecov.io
# -----------------------------------------------------------------------------
.test_base:
  stage: test
  script:
    - pip install uv --quiet
    - uv venv --quiet
    - source .venv/bin/activate
    - uv pip install django${DJANGO_VERSION} pytest pytest-django pytest-cov --quiet
    - uv pip install -e . --quiet
    - pytest --cov=src/clade --cov-report=term-missing --cov-report=xml || [ $? -eq 5 ]
    - pip install codecov-cli --quiet
    - codecovcli upload-process --file coverage.xml --flag unittests --git-service gitlab
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

# Django 5.2 LTS — active (v0.1.0 → v0.8.0)
test-py310-dj52:
  extends: .test_base
  image: python:3.10-slim
  variables:
    DJANGO_VERSION: "~=5.2"

test-py311-dj52:
  extends: .test_base
  image: python:3.11-slim
  variables:
    DJANGO_VERSION: "~=5.2"

test-py312-dj52:
  extends: .test_base
  image: python:3.12-slim
  variables:
    DJANGO_VERSION: "~=5.2"

test-py313-dj52:
  extends: .test_base
  image: python:3.13-slim
  variables:
    DJANGO_VERSION: "~=5.2"

